<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A confusing form speedrun game built with Elm" />
    <title>Form Panic Bureau</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <main class="boot-message">
        <h1>Form Panic Bureau</h1>
        <p>Elm game is loading.</p>
      </main>
    </div>
    <script src="app.js"></script>
    <script>
      if (window.Elm && window.Elm.Main) {
        const params = new URLSearchParams(window.location.search);
        const demoMode =
          params.get("demo") === "1" ||
          window.location.hostname.endsWith(".github.io");

        window.Elm.Main.init({
          node: document.getElementById("app"),
          flags: { demoMode },
        });
      } else {
        document.getElementById("app").innerHTML = `
          <main class="boot-message">
            <h1>Form Panic Bureau</h1>
            <p>Elmのbuildが必要です。</p>
            <code>nix develop --command npm run build:frontend</code>
          </main>
        `;
      }
    </script>
  </body>
</html>
